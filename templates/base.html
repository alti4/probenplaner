<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Probenplaner{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#2c5f8a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Probenplaner">
</head>
<body>
  <header>
    <nav>
      <a href="/" class="nav-logo">Probenplaner</a>
      <div class="nav-links">
        <a href="/" class="nav-link">Proben</a>
        <a href="/repertoire" class="nav-link">Repertoire</a>
      </div>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
